
<!-- página  que lê um nome, apresenta quantidade de caracteres, variações em misculo e minusculo dentro do arquivo html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Title</title>
</head>
<body>
    <h1>Hello, World!</h1>
    <p>This is a basic HTML template.</p>

    <script>

     var  nome = window.prompt("Qual seu nome? ")
     var caracteres = nome.length
    

     document.write("Seu nome tem: " + String(caracteres) + "<br>")
     document.write("nome maisculo: " + nome.toUpperCase() + "<br>")
     document.write("nome minusculo: " + nome.toLowerCase() + "<br>")

        </script>
</body>
</html>
